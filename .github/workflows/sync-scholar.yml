name: Sync Google Scholar

on:
  schedule:
    - cron: "0 8 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install scholarly

      - name: Sync publications
        env:
          GOOGLE_SCHOLAR_ID: ${{ vars.GOOGLE_SCHOLAR_ID }}
        run: |
          if [ -n "$GOOGLE_SCHOLAR_ID" ]; then
            python3 - <<'PY'
          import json
          from pathlib import Path
          cfg = json.loads(Path("data/scholar_config.json").read_text())
          import os
          cfg["scholar_user_id"] = os.environ["GOOGLE_SCHOLAR_ID"]
          Path("data/scholar_config.json").write_text(json.dumps(cfg, indent=2) + "\n")
          PY
          fi
          python3 scripts/sync_scholar.py

      - name: Commit publications
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/publications.json publications.html
          git diff --staged --quiet || git commit -m "chore: sync publications from Google Scholar"
          git push
